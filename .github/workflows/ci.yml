name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:

jobs:
  build:
    name: Build 🛠️
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
      - uses: actions/checkout@v3

      - name: Install Nix 📦
        uses: cachix/install-nix-action@v17

      - name: Run `nix flake check` 🧪
        run: nix flake check

      - name: Run `nix build` 🏗️
        run: nix build
